version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nutriai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:password@db:5432/nutriai
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL_NAME: gemini-2.5-flash
      MEDIA_BASE_URL: ${MEDIA_BASE_URL}
      UPLOAD_DIR: /app/uploads
      TEST_USER_ID: 00000000-0000-0000-0000-000000000001
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
