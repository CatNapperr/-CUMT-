# PaddleClas config for 12-class cat classification.
# Primary goal: maximum validation accuracy with a high-capacity ImageNet pretrained model.

Global:
  checkpoints: null
  pretrained_model: ./pretrained/CSWinTransformer_large_384_pretrained
  output_dir: ./output/
  device: gpu
  save_interval: 1
  eval_during_train: True
  eval_interval: 1
  epochs: 45
  print_batch_step: 10
  use_visualdl: True
  image_shape: [3, 384, 384]
  save_inference_dir: ./inference/cat12_cswin_large_384
  to_static: False
  use_dali: False

AMP:
  scale_loss: 128.0
  use_dynamic_loss_scaling: True
  level: O1

Arch:
  name: CSWinTransformer_large_384
  class_num: 12

Loss:
  Train:
    - CELoss:
        weight: 1.0
        epsilon: 0.1
  Eval:
    - CELoss:
        weight: 1.0

Optimizer:
  name: AdamW
  beta1: 0.9
  beta2: 0.999
  multi_precision: True
  lr:
    name: Cosine
    learning_rate: 0.00002
    warmup_epoch: 3
  regularizer:
    name: L2
    coeff: 0.0005

DataLoader:
  Train:
    dataset:
      name: ImageNetDataset
      image_root: ./
      cls_label_path: ./paddleclas_data/train_list.txt
      transform_ops:
        - DecodeImage:
            to_rgb: True
            channel_first: False
        - RandCropImage:
            size: 384
        - RandFlipImage:
            flip_code: 1
        - RandAugment:
            num_layers: 2
            magnitude: 5
        - NormalizeImage:
            scale: 1.0/255.0
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]
            order: ''
        - ToCHWImage:
    sampler:
      name: DistributedBatchSampler
      batch_size: 2
      drop_last: False
      shuffle: True
    loader:
      num_workers: 2
      use_shared_memory: False
  Eval:
    dataset:
      name: ImageNetDataset
      image_root: ./
      cls_label_path: ./paddleclas_data/val_list.txt
      transform_ops:
        - DecodeImage:
            to_rgb: True
            channel_first: False
        - ResizeImage:
            resize_short: 438
        - CropImage:
            size: 384
        - NormalizeImage:
            scale: 1.0/255.0
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]
            order: ''
        - ToCHWImage:
    sampler:
      name: DistributedBatchSampler
      batch_size: 4
      drop_last: False
      shuffle: False
    loader:
      num_workers: 2
      use_shared_memory: False

Infer:
  infer_imgs: ./cat_12_test/cat_12_test
  batch_size: 4
  transforms:
    - DecodeImage:
        to_rgb: True
        channel_first: False
    - ResizeImage:
        resize_short: 438
    - CropImage:
        size: 384
    - NormalizeImage:
        scale: 1.0/255.0
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
        order: ''
    - ToCHWImage:
  PostProcess:
    name: Topk
    topk: 3
    class_id_map_file: ./paddleclas_data/label_list.txt

Metric:
  Train:
    - TopkAcc:
        topk: [1, 3]
  Eval:
    - TopkAcc:
        topk: [1, 3]
